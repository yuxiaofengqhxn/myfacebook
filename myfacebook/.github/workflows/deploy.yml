name: 自动部署到阿里云服务器

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 通过 SSH 连接服务器并部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            # 拉取最新代码
            cd ~/myfacebook
            git pull origin master

            # 修复权限
            chmod o+x /root
            chmod -R o+rX /root/myfacebook

            # 部署 nginx 配置并重载
            sudo cp ~/myfacebook/myfacebook/nginx.conf /etc/nginx/sites-enabled/myfacebook
            sudo nginx -t && sudo nginx -s reload
